name: Render Wastewater Report

on:
  schedule:
    - cron: '0 23 * * 4'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: /home/runner/work/_temp/Library
          key: ${{ runner.os }}-r-${{ hashFiles('**/render-report.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libuv1-dev pandoc

      - name: Install R packages
        run: |
          pkgs <- c(
            "sass", "jquerylib", "cachem", "memoise", "rappdirs",
            "bslib", "fs", "htmltools", "knitr", "rmarkdown",
            "here", "lubridate", "readxl", "ggthemes", "scales",
            "patchwork", "ggtext", "htmlTable", "Hmisc", "htmlwidgets",
            "dplyr", "tidyr", "ggplot2", "purrr", "stringr",
            "forcats", "tibble", "readr"
          )
          new_pkgs <- pkgs[!(pkgs %in% installed.packages()[,"Package"])]
          if(length(new_pkgs)) install.packages(new_pkgs, repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Render report
        run: Rscript automate_report.R

      # (optional) commit the generated file back to the repo
      # If you don't need the file committed, you can remove these lines.
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wastewater.html
          git add archive/ --force
          git diff --staged --quiet || git commit -m "Automated wastewater report update"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # point this at the folder that contains the site to deploy
          path: docs
  deploy:
    needs: render
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
