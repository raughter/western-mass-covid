name: Render Wastewater Report

on:
  schedule:
    - cron: '0 2 * * 5'  # Every Friday at 2am UTC (Thursday 10pm ET)
  workflow_dispatch:       # Also allows manual triggering

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libuv1-dev pandoc

      - name: Install R packages
        run: |
          pkgs <- c(
            "sass", "jquerylib", "cachem", "memoise", "rappdirs",
            "bslib", "fs", "htmltools", "knitr", "rmarkdown",
            "here", "lubridate", "readxl", "ggthemes", "scales",
            "patchwork", "ggtext", "htmlwidgets", "htmlTable", "Hmisc",
            "dplyr", "tidyr", "ggplot2", "purrr", "stringr",
            "forcats", "tibble", "readr"
          )
          install.packages(pkgs, repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Render report
        run: Rscript automate_report.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wastewater.html
          git add archive/ --force
          git diff --staged --quiet || git commit -m "Automated wastewater report update"
          git push
